			name="description"
			content="DinoRPG Remastered est un jeu gratuit en ligne inspiré du DinoRPG original : élevez vos dinoz, gagnez des combats, explorez Dinoland, accomplissez des missions et débloquez de nouvelles compétences."
		/>
		<meta property="og:title" lang="fr" content="DinoRPG Remastered - Élevage, combats et aventures de Dinoz" />

			property="og:description"
			lang="fr"
			content="DinoRPG Remastered est un jeu gratuit en ligne inspiré du DinoRPG original : élevez vos dinoz, gagnez des combats, explorez Dinoland, accomplissez des missions et débloquez de nouvelles compétences."
		/>
		<title lang="en">DinoRPG Remastered - Dinoz breeding, battles and adventures</title>
		<meta property="og:title" lang="en" content="DinoRPG Remastered - Dinoz breeding, battles and adventures" />

			property="og:description"
			lang="en"
			content="DinoRPG Remastered is a free online game inspired by the original DinoRPG: breed your Dinoz, win battles, explore Dinoland, complete missions and unlock new skills."
		/>
		<meta name="twitter:card" content="summary" />
		<title>DinoRPG Remastered</title>
		<script defer async>
			function hasFlashSupport() {
				for (const plugin of navigator.plugins) {
					if (plugin['application/x-shockwave-flash'] !== undefined) {
						return true;
					}
				}
				return false;
			}
			if (!hasFlashSupport()) {
				const doc = document.documentElement;
				const script = document.createElement('script');
				script.type = 'text/javascript';
				window.RufflePlayer = window.RufflePlayer || {};
				window.RufflePlayer.config = {
					contextMenu: 'off',
					menu: false,
					autoplay: 'on',
					unmuteOverlay: 'hidden',
					preloader: false
				};
				script.src = `${window.location.origin}/ruffle/ruffle.js`;
				doc.appendChild(script);
			}
		</script>
	</head>
	<body>
		<noscript>
			<strong
				>We're sorry but DinoRPG doesn't work properly without JavaScript enabled. Please enable it to continue.</strong
			>
		</noscript>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
