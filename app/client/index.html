		<meta property="og:title" lang="fr" content="DinoRPG Remastered - Jeu d'élevage de dinoz virtuels" />

		<title lang="en">DinoRPG Remastered - Virtual dinoz breeding game</title>

			property="og:description"

		/>
		<meta name="twitter:card" content="summary" />
		<title>DinoRPG Remastered</title>
		<script defer async>
			function hasFlashSupport() {
				for (const plugin of navigator.plugins) {
					if (plugin['application/x-shockwave-flash'] !== undefined) {
						return true;
					}
				}
				return false;
			}
			if (!hasFlashSupport()) {
				const doc = document.documentElement;
				const script = document.createElement('script');
				script.type = 'text/javascript';
				window.RufflePlayer = window.RufflePlayer || {};
				window.RufflePlayer.config = {
					contextMenu: 'off',
					menu: false,
					autoplay: 'on',
					unmuteOverlay: 'hidden',
					preloader: false
				};
				script.src = `${window.location.origin}/ruffle/ruffle.js`;
				doc.appendChild(script);
			}
		</script>
	</head>
	<body>
		<noscript>
			<strong
				>We're sorry but DinoRPG doesn't work properly without JavaScript enabled. Please enable it to continue.</strong
			>
		</noscript>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
