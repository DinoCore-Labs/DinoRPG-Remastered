name: Wiki CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/wiki/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'eslint.config.ts'
      - '.github/workflows/wiki-ci.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app/wiki/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'eslint.config.ts'
      - '.github/workflows/wiki-ci.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wiki-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint wiki
        run: pnpm exec eslint app/wiki --max-warnings=0

      - name: Build wiki
        run: pnpm wiki:build
